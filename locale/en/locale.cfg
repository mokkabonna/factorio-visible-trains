[mod-setting-name]
visible-trains-wagon-content-icon=Show wagon content icon
visible-trains-icon-scale=Icon size multiplier
visible-trains-locomotive-group-icon=Show train group icon on locomotives
visible-trains-locomotive-group-icon-scale=Locomotive group icon scale
visible-trains-draw-rails=Draw rails

[mod-setting-description]
visible-trains-wagon-content-icon=Show the first item or fluid icon on wagons instead of the wagon sprite on the map.
visible-trains-icon-scale=Global multiplier for train and wagon icon size. 1.0 is base size, 2.0 is 200%, 4.0 is 400%.
visible-trains-locomotive-group-icon=If the train group name has an icon, display it over locomotives.
visible-trains-locomotive-group-icon-scale=Scale multiplier for the train-group icon rendered over locomotives. 1.0 matches wagon icon size.
visible-trains-draw-rails=Draw rails

