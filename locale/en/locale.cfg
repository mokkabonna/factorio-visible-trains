[mod-setting-name]
visible-trains-wagon-content-icon=Show wagon content icon
visible-trains-icon-scale=Icon size multiplier

[mod-setting-description]
visible-trains-wagon-content-icon=Show the first item or fluid icon on wagons instead of the wagon sprite on the map.
visible-trains-icon-scale=Global multiplier for train and wagon icon size. 1.0 is base size, 2.0 is 200%, 4.0 is 400%.
